report_comment: >
  This report has been generated by the <a href="https://github.com/nfdata-omics/spatialomics/tree/dev" target="_blank">nfdata-omics/spatialomics</a>
  analysis pipeline.
report_section_order:
  fastqc:
    order: 5000
  spaceranger_metrics:
    order: 4000
  qc_section:
    order: 3000
  "nfdata-omics-spatialomics-methods-description":
    order: -1000
  software_versions:
    order: -1001
  "nfdata-omics-spatialomics-summary":
    order: -1002

export_plots: true

disable_version_detection: true

# Run only these modules
run_modules:
  - custom_content
  - fastqc
  - spaceranger

# Customize file name patterns
sp:
  spaceranger:
    fn: "*web_summary.html"
    contents: None
  spaceranger_metrics:
    fn: "spaceranger_metrics.csv"
  qc_metrics:
    fn: "qc_metrics.csv"
  qc_distributions:
    fn: "qc_distributions.html"

custom_data:
  spaceranger_metrics:
    id: "spaceranger_metrics"
    section_name: "Space Ranger metrics"
    description: |
      This table summarizes key metrics from the Space Ranger analysis across all samples.
      It includes information such as the number of reads, the percentage of reads mapped to the probe set,
      and other relevant statistics that can help assess the quality of the spatial transcriptomics data.
    plot_type: "table"
    pconfig:
      id: "spaceranger_metrics_table"
  qc_distributions:
    parent_id: qc_section
    parent_name: "Quality Control"
    parent_description: |
      This section includes key quality control (QC) metrics and their distributions across all samples.
    id: "qc_distributions"
    section_name: "QC distributions"
    description: |
      This section includes visualizations of the distributions of QC metrics across all samples.
    plot_type: "html"
    pconfig:
      id: "qc_distributions_html"
  qc_metrics:
    parent_id: qc_section
    parent_name: "Quality Control"
    parent_description: |
      This section includes key quality control (QC) metrics and their distributions across all samples.
    id: "qc_metrics"
    section_name: "QC metrics"
    description: |
      This table summarizes key QC metrics across all samples.
    plot_type: "table"
    pconfig:
      id: "qc_metrics_table"
