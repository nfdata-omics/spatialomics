report_comment: >
  This report has been generated by the <a href="https://github.com/nfdata-omics/spatialomics/tree/dev" target="_blank">nfdata-omics/spatialomics</a>
  analysis pipeline.
report_section_order:
  fastqc:
    order: 5000
  spaceranger_metrics:
    order: 4000
  spaceranger_metrics_mapping:
    order: 4000
  spaceranger_metrics_sequencing:
    after: spaceranger_metrics_mapping
  spaceranger_metrics_2um:
    after: spaceranger_metrics_sequencing
  spaceranger_metrics_8um:
    after: spaceranger_metrics_2um
  spaceranger_metrics_16um:
    after: spaceranger_metrics_8um
  qc_section:
    order: 3000
  qc_distributions:
    order: 30
  qc_metrics:
    after: qc_distributions
  segmentation:
    order: 2500
  segmentation_stats:
    order: 30
  bin2cell:
    order: 2400
  bin2cell_summary:
    order: 30
  imaging_and_segmentation:
    order: 2000
  "nfdata-omics-spatialomics-methods-description":
    order: -1000
  software_versions:
    order: -1001
  "nfdata-omics-spatialomics-summary":
    order: -1002

export_plots: true

disable_version_detection: true

# Run only these modules
run_modules:
  - custom_content
  - fastqc
  - spaceranger

# Remove these sections from the report
remove_sections:
  - fastqc_per_base_sequence_content
  - fastqc_per_sequence_gc_content
  - fastqc_sequence_duplication_levels
  - fastqc_overrepresented_sequences
  - fastqc_top_overrepresented_sequences
  - fastqc_status_checks

# Customize the columns shown in the general stats table
table_columns_visible:
  FastQC:
    percent_duplicates: false
    percent_gc: false
    avg_sequence_length: true
    median_sequence_length: true
    percent_fails: false
    total_sequences: true

# # Customize the columns order in the general stats table
table_columns_placement:
  "Custom content: SpaceRanger":
    "Number of Bins Under Tissue 8 µm": 1100
    "Mean Reads Under Tissue per Bin 8 µm": 1200
    "Mean UMIs Under Tissue per Bin 8 µm": 1300
    "Total Genes Detected Under Tissue 8 µm": 1400

# Grouping R1 and R2 in the same table entry
table_sample_merge:
  "R1": "_1"
  "R2": "_2"

# Customize file name patterns
sp:
  spaceranger:
    fn: "*web_summary.html"
    contents: None
  spaceranger_metrics_mapping:
    fn: "spaceranger_metrics.csv"
    shared: true
  spaceranger_metrics_sequencing:
    fn: "spaceranger_metrics.csv"
    shared: true
  spaceranger_metrics_2um:
    fn: "spaceranger_metrics.csv"
    shared: true
  spaceranger_metrics_8um:
    fn: "spaceranger_metrics.csv"
    shared: true
  spaceranger_metrics_16um:
    fn: "spaceranger_metrics.csv"
    shared: true
  spaceranger_general_stats:
    fn: "spaceranger_metrics.csv"
    shared: true
  qc_metrics:
    fn: "qc_metrics.csv"
  qc_distributions:
    fn: "qc_distributions.html"
  imaging_and_segmentation_sample:
    fn: "*_imaging_and_segmentation_mqc.html"
  segmentation_stats:
    fn: "*_segmentation_stats.csv"
  bin2cell_summary:
    fn: "*_bin2cell_summary.csv"

custom_data:
  spaceranger_general_stats:
    plot_type: "generalstats"
    headers:
      - "Number of Bins Under Tissue 8 µm":
          namespace: "SpaceRanger"
          title: "Number of bins"
          description: "Number of 8 µm binned squares under tissue."
      - "Mean Reads Under Tissue per Bin 8 µm":
          namespace: "SpaceRanger"
          title: "Mean Reads"
          description: "The mean number of reads under tissue per bin of 8 µm."
      - "Mean UMIs Under Tissue per Bin 8 µm":
          namespace: "SpaceRanger"
          title: "Mean UMIs"
          description: "The mean number of UMIs under tissue per bin of 8 µm."
      - "Total Genes Detected Under Tissue 8 µm":
          namespace: "SpaceRanger"
          title: "Total Genes"
          description: "The total number of genes detected in 8 µm resolution."
    pconfig:
      - "Number of Bins Under Tissue 8 µm"
      - "Mean Reads Under Tissue per Bin 8 µm"
      - "Mean UMIs Under Tissue per Bin 8 µm"
      - "Total Genes Detected Under Tissue 8 µm"

  spaceranger_metrics_mapping:
    parent_id: spaceranger_metrics
    parent_name: "Space Ranger metrics"
    parent_description: |
      Summary tables from Space Ranger, covering probe-set mapping, sequencing quality,
      and binned tissue metrics.
    id: "spaceranger_metrics_mapping"
    section_name: "Mapping"
    description: |
      Probe-set mapping metrics reported by Space Ranger for each sample.
    plot_type: "table"
    headers:
      "Reads Mapped to Probe Set":
        title: "Reads Mapped to Probe Set"
        description: "Fraction of reads that mapped with MAPQ>0 to the probe set."
      "Reads Mapped Confidently to Probe Set":
        title: "Reads Mapped Confidently to Probe Set"
        description: "Fraction of reads that mapped with MAPQ=255 to one unique probe in the probe set."
      "Reads Mapped Confidently to the Filtered Probe Set":
        title: "Reads Mapped Confidently to the Filtered Probe Set"
        description: "Fraction of reads that mapped with MAPQ=255 to one unique probe in the filtered probe set. These reads are considered for UMI counting."
      "Reads Half-Mapped to Probe Set":
        title: "Reads Half-Mapped to Probe Set"
        description: "Fraction of reads that mapped to unpaired ligation products."
      "Reads Split-Mapped to Probe Set":
        title: "Reads Split-Mapped to Probe Set"
        description: "Fraction of reads that mapped to mispaired ligation products."

  spaceranger_metrics_sequencing:
    parent_id: spaceranger_metrics
    parent_name: "Space Ranger metrics"
    parent_description: |
      Summary tables from Space Ranger, covering probe-set mapping, sequencing quality,
      and binned tissue metrics.
    id: "spaceranger_metrics_sequencing"
    section_name: "Sequencing"
    description: |
      Sequencing, barcode, UMI, and tissue-associated read metrics reported by Space Ranger.
    plot_type: "table"
    headers:
      "Number of Reads":
        title: "Number of Reads"
        description: "Total number of read pairs that were assigned to this library in demultiplexing."
      "Valid Barcodes":
        title: "Valid Barcodes"
        description: "Fraction of reads with barcodes that match the whitelist after barcode correction."
      "Valid UMIs":
        title: "Valid UMIs"
        description: "Fraction of reads with valid UMIs; i.e. UMI sequences that do not contain Ns and that are not homopolymers."
      "Sequencing Saturation":
        title: "Sequencing Saturation"
        description: "The fraction of reads originating from an already-observed UMI. This is a function of library complexity and sequencing depth. More specifically, this is the fraction of confidently mapped, valid square-barcode, valid UMI reads that had a non-unique square-barcode/UMI/gene combination."
      "Q30 Bases in Barcode":
        title: "Q30 Bases in Barcode"
        description: "Fraction of cell barcode bases with Q-score >= 30, excluding very low quality/no-call (Q <= 2) bases from the denominator."
      "Q30 Bases in Probe Read":
        title: "Q30 Bases in Probe Read"
        description: "Fraction of RNA read bases with Q-score >= 30, excluding very low quality/no-call (Q <= 2) bases from the denominator. This is Read 2 for the Visium v1 chemistry."
      "Q30 Bases in UMI":
        title: "Q30 Bases in UMI"
        description: "Fraction of UMI bases with Q-score >= 30, excluding very low quality/no-call (Q <= 2) bases from the denominator."
      "Fraction of Bins Under Tissue 8 µm":
        title: "Fraction of Bins Under Tissue 8 µm"
        description: "Fraction of 8 µm bins covered by tissue."
      "UMIs per sq mm of Tissue":
        title: "UMIs per sq mm of Tissue"
        description: "Number of UMIs from the Gene Expression library observed per unit area of tissue."
      "Reads per sq mm of Tissue":
        title: "Reads per sq mm of Tissue"
        description: "Number of reads from the Gene Expression library observed per unit area of tissue."
      "Fraction Reads in Squares Under Tissue":
        title: "Fraction Reads in Squares Under Tissue"
        description: "The fraction of valid-barcode, confidently-mapped-to-probe-set reads with tissue-associated barcodes."

  spaceranger_metrics_2um:
    parent_id: spaceranger_metrics
    parent_name: "Space Ranger metrics"
    parent_description: |
      Summary tables from Space Ranger, covering probe-set mapping, sequencing quality,
      and binned tissue metrics.
    id: "spaceranger_metrics_2um"
    section_name: "2 µm"
    description: |
      Spatial tissue metrics computed at 2 µm resolution.
    plot_type: "table"
    headers:
      "Number of Squares Under Tissue 2 µm":
        title: "Number of Squares Under Tissue 2 µm"
      "Mean Reads Under Tissue per Square 2 µm":
        title: "Mean Reads Under Tissue per Square 2 µm"
      "Fraction of Squares Under Tissue 2 µm":
        title: "Fraction of Squares Under Tissue 2 µm"
      "Mean Genes Under Tissue per Square 2 µm":
        title: "Mean Genes Under Tissue per Square 2 µm"
      "Mean UMIs Under Tissue per Square 2 µm":
        title: "Mean UMIs Under Tissue per Square 2 µm"
      "Total Genes Detected Under Tissue 2 µm":
        title: "Total Genes Detected Under Tissue 2 µm"
      "UMIs per sq mm of Tissue":
        title: "UMIs per sq mm of Tissue"
      "Reads per sq mm of Tissue":
        title: "Reads per sq mm of Tissue"

  spaceranger_metrics_8um:
    parent_id: spaceranger_metrics
    parent_name: "Space Ranger metrics"
    parent_description: |
      Summary tables from Space Ranger, covering probe-set mapping, sequencing quality,
      and binned tissue metrics.
    id: "spaceranger_metrics_8um"
    section_name: "8 µm"
    description: |
      Spatial tissue metrics computed at 8 µm resolution.
    plot_type: "table"
    headers:
      "Number of Bins Under Tissue 8 µm":
        title: "Number of Bins Under Tissue 8 µm"
      "Mean Reads Under Tissue per Bin 8 µm":
        title: "Mean Reads Under Tissue per Bin 8 µm"
      "Fraction of Bins Under Tissue 8 µm":
        title: "Fraction of Bins Under Tissue 8 µm"
      "Mean Genes Under Tissue per Bin 8 µm":
        title: "Mean Genes Under Tissue per Bin 8 µm"
      "Mean UMIs Under Tissue per Bin 8 µm":
        title: "Mean UMIs Under Tissue per Bin 8 µm"
      "Total Genes Detected Under Tissue 8 µm":
        title: "Total Genes Detected Under Tissue 8 µm"
      "UMIs per sq mm of Tissue":
        title: "UMIs per sq mm of Tissue"
      "Reads per sq mm of Tissue":
        title: "Reads per sq mm of Tissue"

  spaceranger_metrics_16um:
    parent_id: spaceranger_metrics
    parent_name: "Space Ranger metrics"
    parent_description: |
      Summary tables from Space Ranger, covering probe-set mapping, sequencing quality,
      and binned tissue metrics.
    id: "spaceranger_metrics_16um"
    section_name: "16 µm"
    description: |
      Spatial tissue metrics computed at 16 µm resolution.
    plot_type: "table"
    headers:
      "Number of Bins Under Tissue 16 µm":
        title: "Number of Bins Under Tissue 16 µm"
      "Mean Reads Under Tissue per Bin 16 µm":
        title: "Mean Reads Under Tissue per Bin 16 µm"
      "Fraction of Bins Under Tissue 16 µm":
        title: "Fraction of Bins Under Tissue 16 µm"
      "Mean Genes Under Tissue per Bin 16 µm":
        title: "Mean Genes Under Tissue per Bin 16 µm"
      "Mean UMIs Under Tissue per Bin 16 µm":
        title: "Mean UMIs Under Tissue per Bin 16 µm"
      "Total Genes Detected Under Tissue 16 µm":
        title: "Total Genes Detected Under Tissue 16 µm"
      "UMIs per sq mm of Tissue":
        title: "UMIs per sq mm of Tissue"
      "Reads per sq mm of Tissue":
        title: "Reads per sq mm of Tissue"

  qc_distributions:
    parent_id: qc_section
    parent_name: "Quality control"
    parent_description: |
      Quality-control summaries for spatial metrics used to assess each sample.
    id: "qc_distributions"
    section_name: "QC distributions"
    description: |
      Distributions of the number of total counts, number of genes and percentage of
      mitochondrial reads across the samples.
    plot_type: "html"
    pconfig:
      id: "qc_distributions_html"

  qc_metrics:
    parent_id: qc_section
    parent_name: "Quality control"
    parent_description: |
      Quality-control summaries for spatial metrics used to assess each sample.
    id: "qc_metrics"
    section_name: "QC summary table"
    description: |
      Per-sample QC metrics collected by the pipeline.
    plot_type: "table"
    pconfig:
      id: "qc_metrics_table"

  segmentation_stats:
    parent_id: segmentation
    parent_name: "Segmentation Summary"
    parent_description: |
      Per-sample segmentation statistics computed from microscopy-derived
      segmentation masks.
    id: "segmentation_stats"
    section_name: "Segmentation statistics"
    description: |
      Per-sample segmentation metrics computed across the whole microscopy
      image and within the Visium capture area. Segment areas are reported
      in full-resolution pixels.
    plot_type: "table"
    pconfig:
      id: "segmentation_stats_table"
      title: "Segmentation statistics"
    headers:
      segmentation_downsample_factor:
        title: "Segmentation downsample factor"
        description: "Downsample factor between the full-resolution microscopy image and the segmentation mask."
      microscopy_height_px:
        title: "Microscopy height (px)"
        description: "Full-resolution microscopy image height in pixels."
        hidden: true
      microscopy_width_px:
        title: "Microscopy width (px)"
        description: "Full-resolution microscopy image width in pixels."
        hidden: true
      segmentation_height_px:
        title: "Segmentation height (px)"
        description: "Segmentation mask height in pixels."
        hidden: true
      segmentation_width_px:
        title: "Segmentation width (px)"
        description: "Segmentation mask width in pixels."
        hidden: true
      visium_x0_px:
        title: "Visium x0 (px)"
        description: "Left boundary of the Visium area in full-resolution microscopy pixels."
        hidden: true
      visium_y0_px:
        title: "Visium y0 (px)"
        description: "Top boundary of the Visium area in full-resolution microscopy pixels."
        hidden: true
      visium_x1_px:
        title: "Visium x1 (px)"
        description: "Right boundary of the Visium area in full-resolution microscopy pixels."
        hidden: true
      visium_y1_px:
        title: "Visium y1 (px)"
        description: "Bottom boundary of the Visium area in full-resolution microscopy pixels."
        hidden: true
      visium_width_px:
        title: "Visium width (px)"
        description: "Width of the Visium area in full-resolution microscopy pixels."
        hidden: true
      visium_height_px:
        title: "Visium height (px)"
        description: "Height of the Visium area in full-resolution microscopy pixels."
        hidden: true
      whole_n_segments:
        title: "Whole image segments"
        description: "Number of segmented objects detected across the whole microscopy image."
        hidden: true
      whole_segmented_fraction:
        title: "Whole image segmented fraction"
        description: "Fraction of whole-image pixels assigned to a non-background segment."
        hidden: true
      whole_segment_density_per_megapixel:
        title: "Whole image segment density / MP"
        description: "Segment count per megapixel across the whole microscopy image."
        hidden: true
      whole_mean_segment_area_fullres_px:
        title: "Whole image mean area (px)"
        description: "Mean segment area across the whole microscopy image, reported in full-resolution pixels."
        hidden: true
      whole_median_segment_area_fullres_px:
        title: "Whole image median area (px)"
        description: "Median segment area across the whole microscopy image, reported in full-resolution pixels."
        hidden: true
      whole_min_segment_area_fullres_px:
        title: "Whole image min area (px)"
        description: "Minimum segment area across the whole microscopy image, reported in full-resolution pixels."
        hidden: true
      whole_max_segment_area_fullres_px:
        title: "Whole image max area (px)"
        description: "Maximum segment area across the whole microscopy image, reported in full-resolution pixels."
        hidden: true
      whole_p05_segment_area_fullres_px:
        title: "Whole image p05 area (px)"
        description: "Fifth percentile segment area across the whole microscopy image, reported in full-resolution pixels."
        hidden: true
      whole_p95_segment_area_fullres_px:
        title: "Whole image p95 area (px)"
        description: "Ninety-fifth percentile segment area across the whole microscopy image, reported in full-resolution pixels."
        hidden: true
      visium_n_segments:
        title: "Visium segments"
        description: "Number of segmented objects detected within the Visium capture area."
      visium_segmented_fraction:
        title: "Visium segmented fraction"
        description: "Fraction of Visium-area pixels assigned to a non-background segment."
        hidden: true
      visium_segment_density_per_megapixel:
        title: "Visium segment density / MP"
        description: "Segment count per megapixel within the Visium capture area."
      visium_mean_segment_area_fullres_px:
        title: "Visium mean area (px)"
        description: "Mean segment area within the Visium capture area, reported in full-resolution pixels."
        hidden: true
      visium_median_segment_area_fullres_px:
        title: "Visium median area (px)"
        description: "Median segment area within the Visium capture area, reported in full-resolution pixels."
      visium_min_segment_area_fullres_px:
        title: "Visium min area (px)"
        description: "Minimum segment area within the Visium capture area, reported in full-resolution pixels."
        hidden: true
      visium_max_segment_area_fullres_px:
        title: "Visium max area (px)"
        description: "Maximum segment area within the Visium capture area, reported in full-resolution pixels."
        hidden: true
      visium_p05_segment_area_fullres_px:
        title: "Visium p05 area (px)"
        description: "Fifth percentile segment area within the Visium capture area, reported in full-resolution pixels."
        hidden: true
      visium_p95_segment_area_fullres_px:
        title: "Visium p95 area (px)"
        description: "Ninety-fifth percentile segment area within the Visium capture area, reported in full-resolution pixels."

  bin2cell_summary:
    parent_id: bin2cell
    parent_name: "Bin2Cell"
    parent_description: |
      Summary of Visium HD bin-to-cell aggregation using segmentation labels.
    id: "bin2cell_summary"
    section_name: "Bin2Cell summary"
    description: |
      Per-sample Bin2Cell assignment statistics. Assigned bins are bins matched
      to an expanded segmentation label before cell-level aggregation.
    plot_type: "table"
    pconfig:
      id: "bin2cell_summary_table"
      title: "Bin2Cell summary"
    headers:
      input_bins:
        title: "Input bins"
        description: "Number of Visium HD bins provided to Bin2Cell."
      assigned_bins:
        title: "Assigned bins"
        description: "Number of bins assigned to an expanded segmentation label."
      unassigned_bins:
        title: "Unassigned bins"
        description: "Number of bins not assigned to an expanded segmentation label."
      assigned_fraction:
        title: "Assigned fraction"
        description: "Fraction of input bins assigned to an expanded segmentation label."
      unassigned_fraction:
        title: "Unassigned fraction"
        description: "Fraction of input bins not assigned to an expanded segmentation label."
        hidden: true
      segmentation_labels:
        title: "Segmentation labels"
        description: "Number of non-background segmentation labels in the input mask."
      output_cells:
        title: "Output cells"
        description: "Number of cell-level observations produced by Bin2Cell."
      volume_ratio:
        title: "Volume ratio"
        description: "Volume ratio passed to bin2cell.expand_labels."
        hidden: true
      bin_size:
        title: "Bin size"
        description: "Space Ranger binned_outputs resolution used by Bin2Cell."
