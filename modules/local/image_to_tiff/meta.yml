name: image_to_tiff
description: Convert microscopy images to uncompressed contiguous memmappable OME-TIFF files
keywords:
  - microscopy
  - tiff
  - bigtiff
  - czi
  - btf
  - memmap
tools:
  - tifffile:
      description: |
        tifffile reads and writes TIFF, BigTIFF, OME-TIFF, and related image formats.
      homepage: https://github.com/cgohlke/tifffile
      documentation: https://iridescent.ink/tifffile/tifffile.html
      licence: ["BSD-3-Clause"]
  - czifile:
      description: |
        czifile reads Carl Zeiss Image CZI files.
      homepage: https://github.com/cgohlke/czifile
      documentation: https://pypi.org/project/czifile/
      licence: ["BSD-3-Clause"]
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information.
          e.g. [ id:'NFG021_002' ]
    - input_image:
        type: file
        description: Input microscopy image in CZI, BTF, TIFF, or BigTIFF-compatible format
        pattern: "*.{czi,btf,tif,tiff}"
output:
  tiff:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information.
            e.g. [ id:'NFG021_002' ]
      - "*_memmappable.ome.tif":
          type: file
          description: Uncompressed contiguous OME-TIFF suitable for tifffile.memmap
          pattern: "*_memmappable.ome.tif"
  versions_container:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - container:
          type: string
          description: The runtime environment type
      - docker.io/nfdata/cellpose-cuda:v4.0.8-torch2.10.0-cuda12.1.1:
          type: string
          description: The Docker image used by the module
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - container:
          type: string
          description: The runtime environment type
      - docker.io/nfdata/cellpose-cuda:v4.0.8-torch2.10.0-cuda12.1.1:
          type: string
          description: The Docker image used by the module
containers:
  docker:
    linux/amd64:
      name: docker.io/nfdata/cellpose-cuda:v4.0.8-torch2.10.0-cuda12.1.1
